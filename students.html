<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alumnos</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="sidebar-container"></div>

<div class="main">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h2>Gestión de Alumnos</h2>
      <p class="subtitle">Base de comunidad</p>
    </div>
  </div>

  <div class="grid-courses">

    <!-- FORM -->
    <div class="box">

      <h3>Alta / Edición</h3>

      <input type="hidden" id="student-id">

      <div class="row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="student-name">
        </div>

        <div class="form-group">
          <label>Apellido</label>
          <input type="text" id="student-lastname">
        </div>
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" id="student-phone">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="student-email">
      </div>

      <div class="form-group">
        <label>Domicilio</label>
        <input type="text" id="student-address">
      </div>

      <div class="form-group">
        <label>Fecha de Nacimiento</label>
        <input type="text" id="student-birth" placeholder="DD/MM/YYYY">
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select id="student-status">
          <option>Activo</option>
          <option>Inactivo</option>
        </select>
      </div>

      <div class="form-group">
        <label>Observaciones</label>
        <textarea id="student-notes"></textarea>
      </div>

      <button class="btn-primary full" id="save-student">Guardar</button>

    </div>

    <!-- LISTA -->
    <div class="box">
      <h3>Alumnos</h3>
    </div>

  </div>

</div>

<script src="layout.js"></script>
<script type="module" src="./js/students.js"></script>

</body>
</html>
