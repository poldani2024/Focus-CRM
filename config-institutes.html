<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Institutos</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div>
    <div class="logo">ANDREA CURSOS</div>
    <div class="title">Cobros y Alumnas</div>

    <div class="menu">
      <a href="index.html">Inicio</a>
      <a>Alumnas</a>
      <a href="courses.html">Cursos</a>
      <a>Pagos</a>
      <a>Asistencia</a>
      <a class="active">Configuración</a>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <div>
      <h2>Institutos</h2>
      <p class="subtitle">Administración de sedes</p>
    </div>
  </div>

  <div class="grid-courses">

    <!-- FORM -->
    <div class="box">
      <h3>Alta / Edición</h3>

      <div class="form-group">
        <label>Nombre</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Domicilio</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Localidad</label>
        <select>
          <option>Rosario</option>
          <option>Funes</option>
          <option>Roldán</option>
        </select>
      </div>

      <div class="form-group">
        <label>Teléfono Instituto</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Nombre de Contacto</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Teléfono de Contacto</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select>
          <option>Activo</option>
          <option>Inactivo</option>
        </select>
      </div>

      <button class="btn-primary full">Guardar</button>
    </div>

    <!-- LISTA -->
    <div class="box">
      <h3>Listado</h3>

      <div class="course-item">
        <strong>Instituto ABC</strong>
        <p>Rosario</p>
        <span class="tag green">Activo</span>
      </div>

      <div class="course-item">
        <strong>Centro Cultural Norte</strong>
        <p>Funes</p>
        <span class="tag yellow">Activo</span>
      </div>

      <div class="course-item">
        <strong>Espacio Sur</strong>
        <p>Roldán</p>
        <span class="tag red">Inactivo</span>
      </div>

    </div>

  </div>

</div>

</body>
</html>
