<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sedes</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h2>Sedes</h2>
      <p class="subtitle">Administración de sedes</p>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid-courses">

    <!-- FORM -->
    <div class="box">
      <h3>Alta / Edición</h3>

      <!-- ID oculto -->
      <input type="hidden" id="location-id">

      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="location-name" placeholder="Ej: Museo Cochet">
      </div>

      <div class="form-group">
        <label>Domicilio</label>
        <input type="text" id="location-address">
      </div>

      <div class="form-group">
        <label>Localidad</label>
        <select id="location-city">
          <option value="Rosario">Rosario</option>
          <option value="Funes">Funes</option>
          <option value="Roldán">Roldán</option>
        </select>
      </div>

      <button class="btn-primary full" id="save-btn">Guardar</button>
    </div>

    <!-- LISTA -->
    <div class="box">
      <h3>Listado</h3>
      <!-- Se llena dinámicamente -->
    </div>

  </div>

</div>

<!-- SCRIPTS -->
<script src="layout.js"></script>
<script type="module" src="./js/config-institutes.js"></script>

</body>
</html>
