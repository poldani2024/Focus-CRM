<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sedes</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="sidebar-container"></div>

<div class="main">

  <div class="header">
    <div>
      <h2>Sedes</h2>
      <p class="subtitle">Administración de sedes</p>
    </div>
  </div>

  <div class="grid-courses">

    <div class="box">
      <h3>Alta / Edición</h3>

      <div class="form-group">
        <label>Nombre</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Domicilio</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Localidad</label>
        <select>
          <option>Rosario</option>
          <option>Funes</option>
          <option>Roldán</option>
        </select>
      </div>

      <button class="btn-primary full">Guardar</button>
    </div>

    <div class="box">
      <h3>Listado</h3>

      <div class="course-item">
        <strong>Museo Cochet</strong>
        <span class="tag green">Activo</span>
      </div>

    </div>

  </div>

</div>

<script src="layout.js"></script>

</body>
</html>
