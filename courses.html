<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursos</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="sidebar-container"></div>

<div class="main">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h2>Gestión de Cursos</h2>
      <p class="subtitle">Administración y cuotas</p>
    </div>
  </div>

  <div class="grid-courses">

    <!-- FORM -->
    <div class="box">

      <h3>Alta / Edición</h3>

      <input type="hidden" id="course-id">

      <div class="form-group">
        <label>Nombre</label>
        <input id="course-name">
      </div>

      <div class="form-group">
        <label>Fecha Inicio</label>
        <input type="date" id="course-start">
      </div>

      <div class="form-group">
        <label>Fecha Fin</label>
        <input type="date" id="course-end">
      </div>

      <div class="form-group">
        <label>Precio Base</label>
        <input type="number" id="course-price">
      </div>

      <button class="btn-primary full" onclick="saveCourse()">
        Guardar Curso
      </button>

    </div>

    <!-- CUOTAS -->
    <div class="box">

      <h3>Cuotas</h3>

      <button class="btn-primary" onclick="generateFees()">
        Generar Cuotas
      </button>

      <div style="overflow:auto; margin-top:10px;">
        <table class="fees-table">
          <thead>
            <tr>
              <th>Mes</th>
              <th>Año</th>
              <th>Monto</th>
              <th>Vencimiento</th>
              <th>%</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="fees-body"></tbody>
        </table>
      </div>

    </div>

  </div>

</div>

<script src="layout.js"></script>
<script type="module" src="./js/courses.js"></script>

</body>
</html>
