<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursos</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="sidebar-container"></div>

<div class="main">

  <div class="header">
    <div>
      <h2>Gestión de Cursos</h2>
      <p class="subtitle">Administración de cursos por organizador y sede</p>
    </div>

    <button class="btn-primary">+ Nuevo Curso</button>
  </div>

  <div class="grid-courses">

    <div class="box">

      <h3>Alta / Edición de Curso</h3>

      <div class="form-group">
        <label>Organizador</label>
        <select>
          <option>Seleccionar</option>
          <option>Italiano Essenziale</option>
          <option>ICI Funes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Sede</label>
        <select>
          <option>Seleccionar</option>
          <option>Museo Cochet</option>
          <option>Roldán</option>
          <option>Online</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nombre del Curso</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea></textarea>
      </div>

      <div class="form-group">
        <label>Total de Horas</label>
        <input type="number">
      </div>

      <div class="form-group">
        <label>Días</label>
        <div class="days">
          <label><input type="checkbox"> L</label>
          <label><input type="checkbox"> M</label>
          <label><input type="checkbox"> X</label>
          <label><input type="checkbox"> J</label>
          <label><input type="checkbox"> V</label>
          <label><input type="checkbox"> S</label>
          <label><input type="checkbox"> D</label>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Hora Inicio</label>
          <input type="time">
        </div>
        <div class="form-group">
          <label>Hora Fin</label>
          <input type="time">
        </div>
      </div>

      <div class="form-group">
        <label>Costo ($)</label>
        <input type="number">
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select>
          <option>Plan</option>
          <option>Activo</option>
          <option>Finalizado</option>
          <option>Cancelado</option>
        </select>
      </div>

      <button class="btn-primary full">Guardar Curso</button>

    </div>

    <div class="box">
      <h3>Cursos</h3>

      <div class="course-item clickable">
        <strong>Italiano Inicial</strong>
        <p>Italiano Essenziale · Museo Cochet · Lunes y Miércoles</p>
        <span class="tag green">Activo</span>
      </div>

    </div>

  </div>

</div>

<script src="layout.js"></script>

</body>
</html>
