<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="sidebar-container"></div>

<div class="main">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h2>Gestión de Cursos</h2>
      <p class="subtitle">Administración de cursos por organizador y sede</p>
    </div>
  </div>

  <div class="grid-courses">

    <!-- FORM -->
    <div class="box">

      <h3>Alta / Edición</h3>

      <!-- ID oculto -->
      <input type="hidden" id="course-id">

      <div class="form-group">
        <label>Organizador</label>
        <select id="course-organizer"></select>
      </div>

      <div class="form-group">
        <label>Sede</label>
        <select id="course-location"></select>
      </div>

      <div class="form-group">
        <label>Nombre del Curso</label>
        <input type="text" id="course-name">
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea id="course-description"></textarea>
      </div>

      <div class="form-group">
        <label>Total de Horas</label>
        <input type="number" id="course-hours">
      </div>

      <div class="form-group">
        <label>Días</label>
        <div class="days">
          <label><input type="checkbox" value="L"> L</label>
          <label><input type="checkbox" value="M"> M</label>
          <label><input type="checkbox" value="X"> X</label>
          <label><input type="checkbox" value="J"> J</label>
          <label><input type="checkbox" value="V"> V</label>
          <label><input type="checkbox" value="S"> S</label>
          <label><input type="checkbox" value="D"> D</label>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Hora Inicio</label>
          <input type="time" id="course-start">
        </div>

        <div class="form-group">
          <label>Hora Fin</label>
          <input type="time" id="course-end">
        </div>
      </div>

      <div class="form-group">
        <label>Costo ($)</label>
        <input type="number" id="course-price">
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select id="course-status">
          <option>Plan</option>
          <option>Activo</option>
          <option>Finalizado</option>
          <option>Cancelado</option>
        </select>
      </div>

      <button class="btn-primary full" id="save-course">Guardar</button>

    </div>

    <!-- LISTA -->
    <div class="box">
      <h3>Cursos</h3>
    </div>

  </div>

</div>

<script src="layout.js"></script>
<script type="module" src="./js/courses.js"></script>

</body>
</html>
