<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursos</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div>
    <div class="logo">ANDREA CURSOS</div>
    <div class="title">Cobros y Alumnas</div>

    <div class="menu">
      <a href="index.html">Inicio</a>
      <a>Alumnas</a>
      <a class="active">Cursos</a>
      <a>Pagos</a>
      <a>Asistencia</a>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h2>Gestión de Cursos</h2>
      <p class="subtitle">Administración de cursos por instituto</p>
    </div>

    <button class="btn-primary">+ Nuevo Curso</button>
  </div>

  <!-- GRID -->
  <div class="grid-courses">

    <!-- FORM -->
    <div class="box">

      <h3>Alta / Edición de Curso</h3>

      <div class="form-group">
        <label>Instituto</label>
        <input type="text" placeholder="Ej: Instituto ABC">
      </div>

      <div class="form-group">
        <label>Nombre del Curso</label>
        <input type="text" placeholder="Italiano Inicial">
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea placeholder="Detalle del curso"></textarea>
      </div>

      <div class="form-group">
        <label>Total de Horas</label>
        <input type="number">
      </div>

      <div class="form-group">
        <label>Días</label>
        <div class="days">
          <label><input type="checkbox"> L</label>
          <label><input type="checkbox"> M</label>
          <label><input type="checkbox"> X</label>
          <label><input type="checkbox"> J</label>
          <label><input type="checkbox"> V</label>
          <label><input type="checkbox"> S</label>
          <label><input type="checkbox"> D</label>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Hora Inicio</label>
          <input type="time">
        </div>

        <div class="form-group">
          <label>Hora Fin</label>
          <input type="time">
        </div>
      </div>

      <div class="form-group">
        <label>Costo ($)</label>
        <input type="number">
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select>
          <option>Plan</option>
          <option>Activo</option>
          <option>Finalizado</option>
          <option>Cancelado</option>
        </select>
      </div>

      <button class="btn-primary full">Guardar Curso</button>

    </div>

    <!-- LISTA -->
    <div class="box">

      <h3>Cursos</h3>

      <div class="course-item">
        <div>
          <strong>Italiano Inicial</strong>
          <p>Instituto ABC</p>
          <span class="tag green">Activo</span>
        </div>
      </div>

      <div class="course-item">
        <div>
          <strong>Fonética</strong>
          <p>Centro Cultural</p>
          <span class="tag yellow">Plan</span>
        </div>
      </div>

      <div class="course-item">
        <div>
          <strong>Italiano Avanzado</strong>
          <p>Instituto ABC</p>
          <span class="tag red">Finalizado</span>
        </div>
      </div>

    </div>

  </div>

</div>

</body>
</html>
