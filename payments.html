<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagos</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="sidebar-container"></div>

<div class="main">

  <div class="header">
    <h2>Gestión de Pagos</h2>
  </div>

  <!-- FILTROS -->
  <div class="box filters">

    <select id="filter-organizer"></select>
    <select id="filter-location"></select>
    <select id="filter-course"></select>
    <select id="filter-student"></select>

    <button class="btn-primary" onclick="loadGrid()">Filtrar</button>

  </div>

  <!-- TABLA -->
  <div class="box table-container">
    <table class="payments-table">
      <thead id="payments-head"></thead>
      <tbody id="payments-body"></tbody>
    </table>
  </div>

</div>

<script src="layout.js"></script>
<script type="module" src="./js/payments.js"></script>

</body>
</html>
