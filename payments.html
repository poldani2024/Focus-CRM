<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagos</title>

<link rel="stylesheet" href="styles.css">

<style>
.table-container {
  overflow-x: auto;
}

.payments-table {
  width: 100%;
  border-collapse: collapse;
}

.payments-table th,
.payments-table td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.payments-table th {
  background: #f5f6fa;
}

.filters-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.4);
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.filters-actions {
  display: flex;
  justify-content: flex-end;
}
</style>
</head>

<body>

<div id="sidebar-container"></div>

<div class="main">

  <div class="header">
    <h2>Gestión de Pagos</h2>
  </div>

  <!-- FILTROS -->
  <div class="box">
    <div class="filters-grid">
      <select id="filter-organizer" onchange="onOrganizerChange()"></select>
      <select id="filter-location" onchange="onLocationChange()"></select>
      <select id="filter-course" onchange="onCourseChange()"></select>
      <select id="filter-student"></select>
      <select id="filter-year"></select>
    </div>

    <div class="filters-actions mt">
      <button class="btn-primary" onclick="loadGrid()">Filtrar</button>
    </div>
  </div>

  <!-- TABLA -->
  <div class="box table-container">
    <table class="payments-table">
      <thead id="payments-head"></thead>
      <tbody id="payments-body"></tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div id="payment-modal" class="modal">
  <div class="modal-content">

    <h3>Registrar Pago</h3>

    <input type="date" id="pay-date">

    <select id="pay-method">
      <option>Efectivo</option>
      <option>Transferencia</option>
      <option>Tarjeta</option>
    </select>

    <input type="number" id="pay-amount" placeholder="Monto">
    <input type="text" id="pay-ref" placeholder="Comprobante">

    <button class="btn-primary" onclick="savePayment()">Guardar</button>
    <button onclick="closeModal()">Cancelar</button>

  </div>
</div>

<script src="layout.js"></script>
<script type="module" src="./js/payments.js"></script>

</body>
</html>
